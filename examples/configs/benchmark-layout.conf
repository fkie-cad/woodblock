# benchmark-layout.conf
# To generate the image use: woodblock generate benchmark-layout.conf benchmark-layout.dd
#
# A bifragment-gap benchmark sweep. Every scenario splits the same 8-block file
# into two 4-block halves and separates them with a differently sized gap, so a
# carver can be measured against a growing bifragment gap. This combines all of
# the explicit-placement features:
#   * "sizes fileN" pins the exact block size of every file fragment,
#   * the "R:N" / "Z:N" filler tokens create fillers of an exact block size,
#   * "scenario gap" inserts padding between consecutive scenarios, and
#   * "image size" pads the whole image up to a fixed number of blocks.
[general]
seed = 4711
corpus = ../../tests/data/corpus/
block size = 512
scenario gap = 2
image size = 128

# 2-block gap of random data between the halves.
[gap 2 blocks]
file1 = 4096
sizes file1 = 4, 4
layout = 1-1, R:2, 1-2

# 8-block gap of random data between the halves.
[gap 8 blocks]
file1 = 4096
sizes file1 = 4, 4
layout = 1-1, R:8, 1-2

# 16-block gap of zeroes between the halves.
[gap 16 blocks]
file1 = 4096
sizes file1 = 4, 4
layout = 1-1, Z:16, 1-2
