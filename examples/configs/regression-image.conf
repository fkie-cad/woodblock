# regression-image.conf
# To generate the image use: woodblock generate regression-image.conf regression-image.dd
#
# A fully-pinned, reproducible "golden" image for regression testing. Every
# placement is explicit, so the same corpus plus this config always yields a
# byte-identical image of a fixed size. It demonstrates:
#   * out-of-order file fragments with explicit "sizes fileN",
#   * sized fillers ("R:N" / "Z:N") interspersed between fragments,
#   * a "missing middle" scenario that omits an interior fragment, and
#   * a deterministic total size via "image size".
[general]
seed = 4711
corpus = ../../tests/data/corpus/
block size = 512
image size = 64

# The 8-block file is split into 2/3/3-block fragments and written out of order
# with a 1-block zero filler and a 1-block random filler in between.
[out of order with fillers]
file1 = 4096
sizes file1 = 2, 3, 3
layout = 1-2, Z:1, 1-1, R:1, 1-3

# The 52-block file is split into 10/20/22-block fragments, but only the first
# and third are placed -- the 20-block middle fragment is missing.
[missing middle]
file1 = letters/ascii_letters
sizes file1 = 10, 20, 22
layout = 1-1, 1-3
