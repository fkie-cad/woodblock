# bifragment-gap.conf
# To generate the image use: woodblock generate bifragment-gap.conf bifragment-gap.dd
#
# This example exercises the explicit-placement features of the config front end:
#   * "sizes fileN" pins the exact block size of every file fragment,
#   * the "R:N" / "Z:N" filler tokens create fillers of an exact block size,
#   * "scenario gap" inserts padding between the two scenarios, and
#   * "image size" pads the whole image up to a fixed number of blocks.
[general]
seed = 4711
corpus = ../../tests/data/corpus/
block size = 512
scenario gap = 4
image size = 32

# A classic bifragment gap: the file is split into a 3-block and a 5-block
# fragment with an 8-block gap of random data in between.
[bifragment gap]
file1 = 4096
sizes file1 = 3, 5
layout = 1-1, R:8, 1-2

# A file with a "missing middle": fragments 1 and 3 are placed (with a 2-block
# zero-filled gap between them) while fragment 2 is omitted from the image.
[explicit missing middle]
file1 = 4096
frags file1 = 3
sizes file1 = 2, 3, 3
layout = 1-1, Z:2, 1-3
